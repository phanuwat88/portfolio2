<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Kanit',sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:
    linear-gradient(rgba(15,23,42,.65),rgba(15,23,42,.8)),
    url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&q=80");
    background-size:cover;
    background-position:center;
}

.content{
    max-width:700px;
    padding:20px;
}

h1{
    font-size:60px;
    margin-bottom:15px;
}

p{
    font-size:20px;
    color:#d1d5db;
    margin-bottom:30px;
}

.btn{
    display:inline-block;
    padding:15px 35px;
    border-radius:50px;
    text-decoration:none;
    color:white;
    background:linear-gradient(45deg,#06b6d4,#3b82f6);
    transition:.3s;
    font-size:18px;
}

.btn:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.nav{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:20px 50px;
    background:rgba(0,0,0,.25);
    backdrop-filter:blur(10px);
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.menu a{
    color:white;
    text-decoration:none;
    margin-left:25px;
}

.menu a:hover{
    color:#38bdf8;
}

@media(max-width:768px){
    h1{
        font-size:38px;
    }

    p{
        font-size:17px;
    }

    .nav{
        padding:15px 20px;
    }

    .menu{
        display:none;
    }
}
</style>

</head>
<body>

<div class="nav">
    <div class="logo">My Website</div>

    <div class="menu">
        <a href="#">หน้าแรก</a>
        <a href="#">เกี่ยวกับ</a>
        <a href="#">ผลงาน</a>
        <a href="#">ติดต่อ</a>
    </div>
</div>

<section class="hero">
    <div class="content">
        <h1>ยินดีต้อนรับ</h1>
        <p>สร้างเว็บไซต์สวย ๆ ด้วย HTML และ CSS ดีไซน์ทันสมัย รองรับทั้งคอมพิวเตอร์และมือถือ</p>

        <a href="#" class="btn">เริ่มต้นใช้งาน</a>
    </div>
</section>

</body>
</html>
